          pushAppHistory(true);
          try {
            window.history.pushState(currentAppHistoryState(), "", window.location.href);
          } catch (e) {}
          window.addEventExploreer("popstate", (event) => {
            restoringFromBrowserHistory = true;
            const handled = restoreAppHistoryState(event.state);
            restoringFromBrowserHistory = false;

            // Keep the booth app open on mobile if Android/iOS browser Back is pressed at Home.
            if (!handled || state.screen === "home") {
              setTimeout(() => pushAppHistory(false), 0);
            }
          });
        }

        window.setLang = function (lang) {
          state.lang = lang;
          localStorage.setItem(LS_LANG, lang);
          setDocumentLang();
          render();
        };

        window.goHome = function () {
          clearAudioState();
          Object.assign(state, {
            screen: "home",
            categoryId: null,
            itemId: null,
            quiz: null,
            selected: null,
            result: null,
          });
          render();
          scrollToCategoryTop();
          pushAppHistory();
        };

        window.resetApp = function () {
          clearAudioState();
          state.stamps = [];
          localStorage.removeItem(LS_STAMPS);
          window.goHome();
        };

        window.goBack = function () {
          clearAudioState();
          if (state.screen === "home") {
            window.goHome();
            return;
          }
          if (state.screen === "category") {
            window.goHome();
            return;
          }
          if (state.categoryId && state.itemId) {
            window.openCategory(state.categoryId, state.itemId);
            return;
          }
          window.goHome();
        };

        window.openCategory = function (categoryId, itemId) {
          clearAudioState();
          const cat = byId(DATA.categories, categoryId);
          Object.assign(state, {
            screen: "category",
            categoryId,
            itemId: itemId || cat.items[0].id,
            quiz: null,
            selected: null,
            result: null,
          });
          render();
          pushAppHistory();
          scrollToCategoryTop();
        };

        function scrollToCategoryTop() {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              window.scrollTo({ top: 0, left: 0, behavior: "smooth" });
            });
          });
        }

        function scrollToItemExplanation() {
          requestAnimationFrame(() => {
            const target = document.getElementById("item-explanation-panel");
            if (target) {
              target.scrollIntoView({ behavior: "smooth", block: "start" });
            } else {
              window.scrollTo({ top: 0, behavior: "smooth" });
            }
          });
        }

        window.selectItem = function (itemId) {
          clearAudioState();
          Object.assign(state, {
            itemId,
            quiz: null,
            selected: null,
            result: null,
            screen: "category",
          });
          render();
          pushAppHistory();
          scrollToItemExplanation();
        };

        function shuffleArray(arr) {
          const out = arr.slice();
          for (let i = out.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [out[i], out[j]] = [out[j], out[i]];
          }
          return out;
        }

        function buildQuestionPool(cat) {
          const pools = [];
          cat.items.forEach((item) => {
            const others = shuffleArray(
              cat.items.filter((x) => x.id !== item.id),
            );
            const otherNames = others.slice(0, 3).map((x) => x.name);
            const otherFacts = others
              .filter((x) => x.fact)
              .slice(0, 3)
              .map((x) => x.fact);

            // Main item-specific MCQ.
            pools.push({
              id: `${cat.id}-${item.id}-main`,
              question: item.question,
              options: item.options.map((opt, i) => ({
                text: opt,
                correct: i === item.correctIndex,
              })),
            });

            // Fact question about this specific item.
            if (item.fact && otherFacts.length >= 3) {
              pools.push({
                id: `${cat.id}-${item.id}-fact`,
                question: {
                  en: `What specific fact was mentioned about “${item.name.en}”?`,
                  ar: `ما المعلومة المحددة التي ذُكرت عن «${item.name.ar}»؟`,
                },
                options: shuffleArray([
                  { text: item.fact, correct: true },
                  ...otherFacts.map((f) => ({ text: f, correct: false })),
                ]),
              });
            }

            // Clue question based on the item’s information.
            if (item.fact && otherNames.length >= 3) {
              pools.push({
                id: `${cat.id}-${item.id}-clue`,
                question: {
                  en: `Which item matches this clue: ${item.fact.en}?`,
                  ar: `أي عنصر تنطبق عليه هذه المعلومة: ${item.fact.ar}؟`,
                },
                options: shuffleArray([
                  { text: item.name, correct: true },
                  ...otherNames.map((n) => ({ text: n, correct: false })),
                ]),
              });
            }
          });
          return pools;
        }

        function pickNewQuestion(cat) {
          const pool = buildQuestionPool(cat);
          if (!state.usedQuestions[cat.id]) state.usedQuestions[cat.id] = [];
          let available = pool.filter(
            (q) => !state.usedQuestions[cat.id].includes(q.id),
          );
          if (available.length === 0) {
            state.usedQuestions[cat.id] = [];
            available = pool;
          }
          const picked =
            available[Math.floor(Math.random() * available.length)];
          state.usedQuestions[cat.id].push(picked.id);
          picked.options = shuffleArray(picked.options);
          return picked;
        }

        window.readyQuestion = function () {
          clearAudioState();
          state.quiz = pickNewQuestion(currentCategory());
          state.selected = null;
          state.result = null;
          state.screen = "question";
          render();
          pushAppHistory();
          scrollToCategoryTop();
        };

        window.selectOption = function (i) {
          state.selected = i;
          document
            .querySelectorAll(".option")
            .forEach((el, idx) => el.classList.toggle("selected", idx === i));
        };

        window.submitAnswer = function () {
          if (state.selected === null || state.selected === undefined) {
            toast(T("selectOne"));
            return;
          }
          const correct = !!state.quiz.options[state.selected].correct;
          state.result = { correct };
          const catId = state.categoryId;
          if (correct && !state.stamps.includes(catId)) {
            state.stamps.push(catId);
            localStorage.setItem(LS_STAMPS, JSON.stringify(state.stamps));
          }
          correct ? playSuccess() : playWrong();
          if (correct) confetti();
          state.screen = "result";
          render();
          pushAppHistory();
          scrollToCategoryTop();
        };

        window.clearAudioState = clearAudioState;

        function header() {
          return `
      <header class="topbar jq-sticky-topbar">
        <div class="jq-topbar-row">
          <button class="btn back-button jq-header-back" onclick="goBack()" type="button">← ${T("back")}</button>
          <button class="brand" onclick="goHome()" aria-label="Home" type="button">
            <span class="flag" aria-hidden="true"></span>
            <span>Jordan Quest <small>رحلة الثقافة الأردنية</small></span>
          </button>
        </div>
        <div class="jq-header-progress" aria-label="${T("progress")}">
          <strong class="jq-progress-label">${T("progress")}</strong>
          ${progress()}
        </div>
        <div class="actions-top">
          <div class="lang" aria-label="${T("language")}">
            <button class="${state.lang === "en" ? "active" : ""}" onclick="setLang('en')" type="button">${T("english")}</button>
            <button class="${state.lang === "ar" ? "active" : ""}" onclick="setLang('ar')" type="button">${T("arabic")}</button>
          </div>
          <button class="btn ghost" onclick="resetApp()" type="button">${T("reset")}</button>
        </div>
      </header>`;
        }

        function progress() {
          return `<div class="jq-progress-icons" aria-label="${T("progress")}">
      ${DATA.categories.map((c) => `<span class="jq-progress-pill ${state.stamps.includes(c.id) ? "done" : ""}" title="${L(c.title)}">${c.icon}</span>`).join("")}
    </div>`;
        }

        function mapComponent(activeId = "", compact = false) {
          const cities = byId(DATA.categories, "cities").items;
          return `<div class="map-wrap exact-city-map" role="region" aria-label="${T("mapTitle")}">
      <img src="${DATA.assets.cityMapExact}" alt="${T("mapTitle")}" />
      ${cities
        .map(
          (item) => `
        <button type="button" class="hotspot exact-hotspot ${activeId === item.id ? "active" : ""}"
          style="--x:${item.zone?.x ?? item.x}%;--y:${item.zone?.y ?? item.y}%;--w:${item.zone?.w ?? 7.2}%;--h:${item.zone?.h ?? 6}%"
          onclick="event.preventDefault(); event.stopPropagation(); openCategory('cities','${item.id}')"
          aria-label="${L(item.name)}" title="${L(item.name)}">
          <span class="hover-card city-name-only">${L(item.name)}</span>
        </button>
      `,
        )
        .join("")}
    </div>`;
        }

        function home() {
          return `<main>
      <section class="home-hero clean-home">
        <img class="home-map-bg" src="${DATA.assets.homeFlagMap}" alt="" aria-hidden="true" />
        <div class="home-glow" aria-hidden="true"></div>
        <div class="home-content">
          <div class="home-kicker">🇯🇴 Jordan Culture Booth</div>
          <h1>Jordan Quest</h1>
          <h2>رحلة الثقافة الأردنية</h2>
          <p>${T("homeHeroText")}</p>
          <div class="home-actions">
            <button class="btn primary" onclick="document.getElementById('categories').scrollIntoView({behavior:'smooth'})">${T("startCities")}</button>
          </div>
        </div>
      </section>

      <section id="categories" class="section-head"><div><h2>${T("chooseCategory")}</h2></div></section>
      <section class="category-grid">
        ${DATA.categories
          .map(
            (
              c,
            ) => `<button class="card ${state.stamps.includes(c.id) ? "done" : ""}" onclick="openCategory('${c.id}')">
          <span class="icon">${c.icon}</span><strong>${L(c.title)}</strong><small>${L(c.intro)}</small>
        </button>`,
          )
          .join("")}
      </section>
    </main>`;
        }

        function category() {
          const cat = currentCategory();
          const item = currentItem();
          const sourceNames = item.sourceIds
            .map((id) => DATA.sources[id]?.name || id)
            .join(" · ");
          return `<main id="category-page-top">
      <section class="section-head">
        <div><h2>${cat.icon} ${L(cat.title)}</h2><p>${L(cat.intro)}</p></div>
      </section>

      <section class="category-layout">
        ${cat.usesMap ? `<section class="map-panel"><p style="margin:0 0 12px;color:var(--muted);font-weight:900">${T("hoverMapHelp")}</p>${mapComponent(item.id)}</section>` : `<section class="panel"><h2>${cat.icon}</h2><p>${L(cat.intro)}</p><p class="source-line">${T("questionPool")}</p></section>`}
        <section class="panel item-explanation-panel" id="item-explanation-panel">
          <h2>${L(item.name)}</h2>
          <div class="item-feature ${currentCategory().id === "food" ? "food-feature" : currentCategory().id === "royal" ? "royal-feature" : ""}">
            ${(currentCategory().id === "food" || currentCategory().id === "royal") && item.imageUrl ? `<img class="food-photo" src="${item.imageUrl}" alt="${L(item.imageAlt)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='grid';" />` : ""}
            <span class="big-icon ${(currentCategory().id === "food" || currentCategory().id === "royal") && item.imageUrl ? "food-photo-fallback" : ""}">${item.icon}</span>
            <div>
              <p>${L(item.text)}</p>
            </div>
          </div>
          <div class="controls">
            <button class="btn primary" onclick="readyQuestion()">${T("ready")}</button>
          </div>
        </section>
      </section>

      <section class="items-grid">
        ${cat.items
          .map(
            (it) => `<button class="item-card" onclick="selectItem('${it.id}')">
          <span class="icon">${it.icon}</span><strong>${L(it.name)}</strong><small>${L(it.text)}</small>
        </button>`,
          )
          .join("")}
      </section>
    </main>`;
        }

        function question() {
          const item = currentItem();
          if (!state.quiz) state.quiz = shuffledQuestion(item);
          return `<main>
      <section class="question-panel">
        <h2>${T("question")}: ${L(state.quiz.question)}</h2>
        <div class="options">
          ${state.quiz.options
            .map(
              (
                opt,
                idx,
              ) => `<button class="option" onclick="selectOption(${idx})">
            <span class="letter">${String.fromCharCode(65 + idx)}</span><span>${L(opt.text)}</span>
          </button>`,
            )
            .join("")}
        </div>
        <div class="controls"><button class="btn primary" onclick="submitAnswer()">${T("submit")}</button></div>
      </section>
    </main>`;
        }

        function result() {
          const item = currentItem();
          const correct = !!state.result?.correct;
          const correctOpt = state.quiz.options.find((o) => o.correct);
          return `<main>
      <section class="result-panel">
        <div class="result-symbol">${correct ? "🇯🇴" : "💡"}</div>
        <h2>${correct ? T("correct") : T("wrong")}</h2>
        <p>${correct ? L(item.text) : `${L(correctOpt.text)} — ${L(item.text)}`}</p>
        ${correct ? `<div class="stamp">${T("stamp")} · ${L(currentCategory().title)}</div>` : ""}
        <div class="controls" style="justify-content:center">
          <button class="btn primary" onclick="readyQuestion()">${T("anotherQuestion")}</button>
          <button class="btn secondary" onclick="goHome()">${T("next")}</button>
        </div>
      </section>
    </main>`;
        }

        function render() {
          setDocumentLang();
          app.innerHTML = `<div class="shell">${header()}${state.screen === "home" ? home() : state.screen === "category" ? category() : state.screen === "question" ? question() : result()}</div>`;
        }

        function clearAudioState() {}

        function toast(msg) {
          const old = document.querySelector(".toast");
          if (old) old.remove();
          const el = document.createElement("div");
          el.className = "toast";
          el.textContent = msg;
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 2600);
        }

        function tone(freq, duration, delay = 0, type = "sine") {
          try {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            const ctx = new Ctx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.value = 0.045;
            osc.connect(gain);
            gain.connect(ctx.destination);
            const now = ctx.currentTime + delay;
            osc.start(now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.stop(now + duration + 0.03);
          } catch (e) {}
        }
        function playSuccess() {
          tone(523, 0.12, 0);
          tone(659, 0.14, 0.12);
          tone(784, 0.18, 0.25, "triangle");
        }
        function playWrong() {
          tone(392, 0.11, 0);
          tone(330, 0.16, 0.14);
        }

        function confetti() {
          const layer = document.createElement("div");
          layer.className = "confetti";
          const colors = ["#CE1126", "#111111", "#007A3D", "#FFFFFF"];
          for (let i = 0; i < 80; i++) {
            const p = document.createElement("span");
            p.style.left = Math.random() * 100 + "%";
            p.style.background = colors[i % colors.length];
            p.style.animationDelay = Math.random() * 0.65 + "s";
            p.style.transform = `rotate(${Math.random() * 360}deg)`;
            layer.appendChild(p);
          }
          document.body.appendChild(layer);
          setTimeout(() => layer.remove(), 3200);
        }

        render();
        initBrowserBackGuard();
      })();
    </script>
  </body>
</html>
